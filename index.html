<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guard Bot Captcha</title>
    <!-- Telegram Mini App kutubxonasini ulash -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        .btn {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
    </style>
</head>
<body>

    <h2>Siz insonmisiz? 🤖</h2>
    <p>Guruhga qo'shilish uchun to'g'ri javobni tanlang:</p>
    <h1>2 + 2 = ?</h1>

    <!-- Javob tugmalari -->
    <button class="btn" onclick="checkAnswer(3)">3</button>
    <button class="btn" onclick="checkAnswer(4)">4</button>
    <button class="btn" onclick="checkAnswer(5)">5</button>

    <script>
        // Telegram Web App obyektini chaqirish
        const tg = window.Telegram.WebApp;
        
        // Ilovani to'liq ekranga yoyish
        tg.expand();

      function checkAnswer(answer) {
            if (answer === 4) {
                // To'g'ri topsa, botga ma'lumot yuboramiz va oyna avtomatik yopiladi
                tg.sendData("success"); 
            } else {
                tg.showAlert("Xato javob! Iltimos qaytadan urinib ko'ring.");
            }
        }
    </script>
</body>
</html>
